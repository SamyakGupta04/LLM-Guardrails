<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-robot logo-icon"></i>
                <h2>Assistant</h2>
            </div>
            <div class="new-chat-btn">
                <i class="fa-solid fa-plus"></i> New Chat
            </div>
            <div class="history-list">
                <div class="history-item active">
                    <i class="fa-regular fa-message"></i>
                    <span>Current Session</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">U</div>
                    <div class="user-info">
                        <span class="name">User</span>
                        <span class="status">Online</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <main class="chat-area">
            <div class="chat-header">
                <div class="model-selector">
                    <span>GPT-4o Mini</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>
            
            <div class="messages-container" id="messages">
                <div class="message bot-message">
                    <div class="message-content">
                        <p>Hello! How can I help you today?</p>
                    </div>
                    <div class="message-meta">Just now</div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
                    <button id="sendBtn" disabled>
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
                <div class="disclaimer">AI can make mistakes. Please check important info.</div>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
